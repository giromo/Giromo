name: Generate Snake Animation

on:
  schedule:
    - cron: '0 0 * * *'    # هر روز ساعت ۰۰:۰۰
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Generate snake animation
        uses: Platane/snk@v3.5.0
        with:
          github_user_name: giromo
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark&color_snake=00FF7F

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v5    
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
