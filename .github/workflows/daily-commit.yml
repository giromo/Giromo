name: Daily Commit

on:
  schedule:
    - cron: "0 6 * * *"   # هر روز ساعت ۶ صبح UTC
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write   

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Make a change
        run: |
          echo "$(date '+%Y-%m-%d %H:%M:%S') - Daily commit by GitHub Actions" >> daily-log.txt
          
          if [ $(wc -l < daily-log.txt) -gt 1000 ]; then
            tail -n 500 daily-log.txt > daily-log.tmp
            mv daily-log.tmp daily-log.txt
            echo "$(date '+%Y-%m-%d %H:%M:%S') - Log file cleaned" >> daily-log.txt
          fi

      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add daily-log.txt
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "📅 Daily commit - $(date '+%Y-%m-%d %H:%M:%S')"
            git push origin HEAD:${{ github.ref_name }}
          fi
